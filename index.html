<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Robot Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container" id="app">
    <div class="spotlight"></div>

    <div class="robot-box">
      <spline-viewer id="robotViewer" url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"></spline-viewer>
    </div>

    <div class="interaction-box">
      <div class="chat-header">
        <span class="header-title">Query Copied!</span>
        <span class="status-indicator">
          <span class="status-dot"></span> Active
        </span>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-footer">
        <span class="copy-alert">📋 Scenario copied! Open NotebookLM and simply press Ctrl+V to paste.</span>
        <a href="https://notebooklm.google.com/notebook/72ddfbc9-d110-4ce8-9588-906ed38e8260/preview" target="_blank" class="notebook-redirect-btn">
          <span>Open NotebookLM</span> 🚀
        </a>
      </div>
    </div>

    <div class="input-bar">
      <input type="text" id="queryInput" placeholder="Ask your robot or start typing...">
      <button id="voiceBtn" title="Speak">🎙️</button>
    </div>
  </div>

  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.54/build/spline-viewer.js"></script>
  <script src="script.js"></script>
</body>
</html>
